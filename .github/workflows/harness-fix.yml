name: Harness Self-Improvement

on:
  issues:
    types: [labeled]

concurrency:
  group: ouroboros-harness-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  fix-harness:
    name: Auto-fix Harness Issue
    if: github.event.label.name == 'harness-improvement'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Acknowledge trigger
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/reactions \
            --method POST --field content='rocket'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Start observability stack
        run: |
          docker compose \
            -f harness/observability/docker-compose.yml \
            -f harness/observability/docker-compose.ci.yml \
            up -d
          for i in $(seq 1 30); do curl -sf http://localhost:9428/health && break; sleep 2; done
          curl -sf http://localhost:9428/health || { echo "VictoriaLogs failed to start"; exit 1; }
          for i in $(seq 1 30); do curl -sf http://localhost:8428/health && break; sleep 2; done
          curl -sf http://localhost:8428/health || { echo "VictoriaMetrics failed to start"; exit 1; }

      - name: Build repo index
        run: uv run python repo_index/build_index.py

      - name: Run agent on harness improvement
        id: run
        run: |
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_BODY=$(cat <<'ISSUE_EOF'
          ${{ github.event.issue.body }}
          ISSUE_EOF
          )

          FULL_PROMPT="Harness improvement issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          ${ISSUE_BODY}

          Implement the suggested fix described above. This is a harness self-improvement task."

          echo "::group::Agent prompt"
          echo "$FULL_PROMPT"
          echo "::endgroup::"

          set +e
          output=$(uv run ouroboros run "$FULL_PROMPT" --worktree 2>&1)
          exit_code=$?
          echo "$output"
          {
            echo "output<<OUROBOROS_EOF"
            echo "$output"
            echo "OUROBOROS_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit $exit_code
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          GCP_LOCATION: ${{ vars.GCP_LOCATION || 'us-central1' }}
          OUROBOROS_MODEL: ${{ vars.OUROBOROS_MODEL || 'gemini-2.5-flash' }}
          LOGFIRE_TOKEN: ${{ secrets.LOGFIRE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VICTORIA_LOGS_URL: http://localhost:9428
          VICTORIA_METRICS_URL: http://localhost:8428
          LOG_ENDPOINT: http://localhost:9001

      - name: Post success comment
        if: success()
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "$(cat <<'EOF'
          **Harness improvement implemented**

          ```
          ${{ steps.run.outputs.output }}
          ```

          Auto-triggered by `harness-improvement` label.
          EOF
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post failure comment
        if: failure() && steps.run.outcome == 'failure'
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "$(cat <<'EOF'
          **Harness improvement failed**

          ```
          ${{ steps.run.outputs.output }}
          ```

          Manual intervention needed.
          EOF
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post workflow summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Harness Self-Improvement

          **Issue:** #${{ github.event.issue.number }} — ${{ github.event.issue.title }}
          **Exit code:** ${{ steps.run.outputs.exit_code }}

          ```
          ${{ steps.run.outputs.output }}
          ```
          EOF

      - name: Tear down observability stack
        if: always()
        run: |
          docker compose \
            -f harness/observability/docker-compose.yml \
            -f harness/observability/docker-compose.ci.yml \
            down -v
